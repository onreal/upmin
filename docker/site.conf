server {
    listen 8383;
    listen [::]:8383;
    server_name _;
    root /app;
    index index.php index.html;

    charset utf-8;

    location = /AGENTS.md {
        return 404;
    }

    location = /docker-compose.yml {
        return 404;
    }

    location ~ /\.(?!well-known) {
        return 404;
    }

    location = /index.php {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_pass http://manage_backend;
    }

    location = /build/index.php {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_pass http://manage_backend;
    }

    location = /manage {
        return 301 /upmin/;
    }

    location = /upmin {
        return 301 /upmin/;
    }

    location = /build {
        return 301 /build/;
    }

    location ~ ^/manage/.*\.php$ {
        return 301 /upmin/;
    }

    location ~ ^/upmin/.*\.php$ {
        return 404;
    }

    location ~* ^/manage/(.+\.(?:css|js|mjs|map|jpg|jpeg|gif|png|svg|webp|ico|woff|woff2))$ {
        return 301 /upmin/$1;
    }

    location ~* ^/upmin/(.+\.(?:css|js|mjs|map|jpg|jpeg|gif|png|svg|webp|ico|woff|woff2))$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files /upmin/public/$1 =404;
    }

    location /manage/ {
        return 301 /upmin/;
    }

    location /upmin/ {
        try_files /upmin/public/index.html =404;
    }

    location /build/ {
        try_files $uri $uri/ /build/index.php?$query_string;
    }

    location ^~ /api/ {
        rewrite ^ /upmin/public/index.php break;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_pass http://manage_backend;
    }

    location ^~ /manage-media/ {
        rewrite ^ /upmin/public/index.php break;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_pass http://manage_backend;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~* \.(?:css|js|mjs|map|jpg|jpeg|gif|png|svg|webp|ico|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri $uri/ =404;
    }

    location = /__public_fallback__ {
        internal;
        rewrite ^ /index.php break;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_pass http://manage_backend;
    }

    location / {
        try_files $uri $uri/ /__public_fallback__;
    }
}
