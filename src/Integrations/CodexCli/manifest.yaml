name: "codex-cli"
description: "Codex CLI"
supportsModels: true
fields:
  - key: "authMode"
    label: "Authentication mode"
    type: "select"
    required: true
    options:
      - value: "cliAuth"
        label: "CLI authentication"
      - value: "apiKey"
        label: "API key"
  - key: "binary"
    label: "CLI binary"
    type: "text"
    required: true
  - key: "args"
    label: "CLI arguments"
    type: "text"
    required: false
  - key: "workingDir"
    label: "Working directory"
    type: "text"
    required: false
  - key: "apiKey"
    label: "API key"
    type: "password"
    required: false
